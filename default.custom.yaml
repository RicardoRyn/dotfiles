patch:
  schema_list:
    - schema: rime_ice
  menu/page_size: 5

  ascii_composer:
    good_old_caps_lock: true
    switch_key:
      Caps_Lock: clear
      Control_L: noop
      Control_R: noop
      Shift_L: noop
      Shift_R: noop

  punctuator:
    full_shape:
      __include: default:/punctuator/full_shape
      "{": "{"
      "}": "}"
      "[": "["
      "]": "]"
    half_shape:
      __include: default:/punctuator/half_shape
      "{": "{"
      "}": "}"
      "[": "["
      "]": "]"
