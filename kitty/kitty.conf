# 字体
font_family      Maple Mono NF CN Medium
bold_font        Maple Mono NF CN Bold
italic_font      Maple Mono NF CN Italic
bold_italic_font Maple Mono NF CN Bold Italic
font_size 13
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# 窗口
# background_opacity 0.90
window_padding_width 0
background_blur 32
hide_window_decorations yes

# 光标
cursor_shape block
cursor_blink_interval 1
cursor_trail 3
cursor_trail_decay 0.1 0.2
cursor_trail_start_threshold 2

# 终端功能
scrollback_lines 3000
copy_on_select yes
strip_trailing_spaces smart

# TAB
tab_bar_style powerline
tab_bar_align left
map ctrl+t new_tab
include dank-tabs.conf

# 主题
include dank-theme.conf

# 连接neovim
allow_remote_control socket-only
listen_on unix:/tmp/kitty
shell_integration enabled
# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten /home/ricardo/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py
# Browse scrollback buffer in nvim
map kitty_mod+h kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output
