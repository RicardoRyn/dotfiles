[mgr]
  linemode = "size"

[preview]
  wrap = "yes"
  sort_by = "natural"

[input]
cursor_blink = true

[opener]
edit = [
  { run = "${EDITOR:-vi} %s", desc = "$EDITOR", for = "unix",    block = true },
  { run = "neovide %s",       desc = "neovide", for = "windows", orphan = true },
  { run = "nvim %s",          desc = "nvim",    for = "windows", block = true },
  { run = "code %s",          desc = "code",    for = "windows", orphan = true },
  { run = "zed %s",           desc = "zed",     for = "windows", orphan = true },
]

[open]
rules = [
  # Folder
  { url = "*/", use = [ "edit", "open", "reveal" ] },
  # Text
  { mime = "text/*", use = [ "edit", "open", "reveal" ] },
  # Image
  { mime = "image/*", use = [ "open", "reveal" ] },
  # Media
  { mime = "{audio,video}/*", use = [ "play", "reveal" ] },
  # Archive
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
  # JSON
  { mime = "application/{json,ndjson}", use = [ "edit", "reveal" ] },
  { mime = "*/javascript", use = [ "edit", "reveal" ] },
  # Empty file
  { mime = "inode/empty", use = [ "edit", "reveal" ] },
  # Virtual file system
  { mime = "vfs/{absent,stale}", use = "download" },
  # Fallback
  { url = "*", use = [ "open", "reveal" ] },
]

[[plugin.prepend_fetchers]]
id    = "git" # Remove if Yazi > v26.1.22
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git" # Remove if Yazi > v26.1.22
url   = "*/"
run   = "git"
group = "git"

[[plugin.prepend_previewers]]
mime = "text/*"
run = "git-diff-toggle"
