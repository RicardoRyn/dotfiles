format = """
[Ôò¡ÔöÇ](bold green) $os\
$conda\
$directory\
${custom.git_branch}\
${custom.git_status}\
${custom.jj}\
$python\
$rust\
$lua\
$fill\
$cmd_duration\
$line_break\
[Ôò░ÔöÇ](bold green)$character
"""

add_newline = true
palette = "catppuccin_latte"
command_timeout = 2000
scan_timeout = 2000

[conda]
symbol = "¯£ò "
format = "[$symbol$environment]($style) "
style = 'bold green'

[directory]
style = 'bold sky'
format = '[$path ]($style)'
truncation_length = 5
truncation_symbol = 'ÔÇª/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '¾░êÖ'
'Downloads' = '´ÇÖ '
'Music' = '´Çü '
'Pictures' = '´Ç¥ '

[python]
symbol = '¯êÁ '
style = 'lavender'

[rust]
symbol = '¯Üï '
style = 'maroon'

[lua]
symbol = '¯ÿá '
style = 'blue'

[fill]
symbol = ' '

[cmd_duration]
format = '[$duration]($style)'
style = 'overlay0'
min_time = 500

[os]
disabled = false
style = 'green'

[os.symbols]
Windows = "¯ÿ¬ "
Ubuntu = "¾░òê "
