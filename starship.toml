[custom.jj]
description = "The current jj status"
when = "jj --ignore-working-copy root"
symbol = "´Éÿ "
command = '''
jj log --revisions @ --no-graph --ignore-working-copy --color always --limit 1 --template '
  separate(" ",
    change_id.shortest(4),
    bookmarks,
    concat(
      if(conflict, "­ƒÆÑ"),
      if(divergent, "­ƒÜº"),
      if(hidden, "­ƒæ╗"),
      if(immutable, "­ƒöÆ"),
    ),
    raw_escape_sequence("\x1b[1;32m") ++ if(
      empty,
      raw_escape_sequence("\x1b[1;32m") ++ "¾░▒Æ" ++ raw_escape_sequence("\x1b[0m"),
      raw_escape_sequence("\x1b[1;33m") ++ "¾░Å¡" ++ raw_escape_sequence("\x1b[0m")
    ),
    raw_escape_sequence(
      if(description.first_line(), "\x1b[1;33m", "\x1b[1;32m")
    )
    ++ coalesce(
      truncate_end(29, description.first_line(), "ÔÇª"),
      "¾░ä▒ "
    )
    ++ raw_escape_sequence("\x1b[0m")
  )
'
'''

[git_branch]
disabled = true
symbol = '´Éÿ '
style = 'teal'

[custom.git_branch]
description = "Only show git_branch if we're not in a jj repo"
when = "! jj --ignore-working-copy root"
command = "starship module git_branch"

[git_status]
disabled = true
format = '([$all_status$ahead_behind]($style) )'
style = 'red'

[custom.git_status]
description = "Only show git_status if we're not in a jj repo"
when = "! jj --ignore-working-copy root"
command = "starship module git_status"
